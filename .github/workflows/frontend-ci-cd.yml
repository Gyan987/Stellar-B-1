name: Frontend CI/CD

on:
  workflow_dispatch:
  pull_request:
    paths:
      - 'Frontend/**'
      - '.github/workflows/frontend-ci-cd.yml'
  push:
    paths:
      - 'Frontend/**'
      - '.github/workflows/frontend-ci-cd.yml'

jobs:
  ci:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: Frontend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: Frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

  deploy-vercel:
    if: github.event_name == 'push' && github.ref == 'refs/heads/master'
    needs: ci
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: Frontend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: Frontend/package-lock.json

      - name: Install Vercel CLI
        run: npm i -g vercel@51.6.1

      - name: Pull Vercel environment (with retry)
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
        run: |
          for i in 1 2 3; do
            vercel pull --yes --environment=production --token="$VERCEL_TOKEN" && break
            if [ "$i" -eq 3 ]; then
              echo "vercel pull failed after 3 attempts"
              exit 1
            fi
            echo "vercel pull failed (attempt $i), retrying in 10s..."
            sleep 10
          done

      - name: Build Vercel artifacts (with retry)
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
        run: |
          for i in 1 2 3; do
            vercel build --prod --token="$VERCEL_TOKEN" && break
            if [ "$i" -eq 3 ]; then
              echo "vercel build failed after 3 attempts"
              exit 1
            fi
            echo "vercel build failed (attempt $i), retrying in 10s..."
            sleep 10
          done

      - name: Deploy to Vercel (with retry)
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
        run: |
          for i in 1 2 3; do
            vercel deploy --prebuilt --prod --token="$VERCEL_TOKEN" && break
            if [ "$i" -eq 3 ]; then
              echo "vercel deploy failed after 3 attempts"
              exit 1
            fi
            echo "vercel deploy failed (attempt $i), retrying in 15s..."
            sleep 15
          done
